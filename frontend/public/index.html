<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0F4C8F" />
        <meta
            name="description"
            content="MIR Consulting helps modern businesses grow with senior-led consulting across business strategy, analytics, marketing, e-commerce and digital transformation. Free initial consultation."
        />
        <meta
            name="keywords"
            content="business consulting, marketing consultant, digital marketing agency, SEO consulting, ecommerce consulting, Shopify consultant, WooCommerce setup, Wix store, Amazon seller setup, eBay setup, Etsy shop, online store setup, virtual assistant ecommerce, business intelligence, Power BI consulting, process automation, digital transformation, D2C brand growth, SMB consulting"
        />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="MIR Consulting" />
        <meta property="og:title" content="MIR Consulting — Strategy. Marketing. E-commerce. Intelligence." />
        <meta
            property="og:description"
            content="Senior-led consulting for ambitious businesses. Strategy, marketing, e-commerce (Shopify, WooCommerce, Wix, Amazon, eBay, Etsy), analytics and digital transformation. Free initial consultation."
        />
        <meta property="og:url" content="https://mir-consulting-front.onrender.com" />

        <!-- Twitter / X -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="MIR Consulting" />
        <meta
            name="twitter:description"
            content="Senior-led consulting for ambitious businesses. Strategy · Marketing · E-commerce · Analytics. Free initial consultation."
        />

        <link rel="canonical" href="https://mir-consulting-front.onrender.com" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "ProfessionalService",
          "name": "MIR Consulting",
          "url": "https://mir-consulting-front.onrender.com",
          "description": "Senior-led consulting across business strategy, marketing, e-commerce, analytics and digital transformation. Free initial consultation for new clients.",
          "image": "https://mir-consulting-front.onrender.com/og.png",
          "areaServed": "Worldwide",
          "inLanguage": ["en","de","es"],
          "founder": { "@type": "Organization", "name": "MIR Consulting" },
          "sameAs": [
            "https://www.linkedin.com/company/mir-consulting"
          ],
          "offers": [
            {
              "@type": "Offer",
              "name": "Free initial consultation",
              "price": "0",
              "priceCurrency": "EUR",
              "description": "30-minute discovery call for new clients. No commitment."
            }
          ],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "MIR Consulting Services",
            "itemListElement": [
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Business Consulting", "description": "Operational optimization, business process improvement, strategic advisory." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Analytics & Business Intelligence", "description": "Dashboards, KPI systems, Power BI consulting, reporting architecture." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "IT Consulting", "description": "Infrastructure consulting, systems optimization, technology advisory." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Process Automation", "description": "Workflow automation, internal systems, operational monitoring." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Marketing & Brand Growth", "description": "SEO, content marketing, paid acquisition, brand positioning, social media, email marketing." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "E-commerce & Online Sales", "description": "Shopify, WooCommerce, Wix store builds. Amazon, eBay, Etsy seller setup. Multi-channel listing and virtual-assistant store operations." } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Digital Transformation", "description": "Transformation roadmap, operating model design, change enablement." } }
            ]
          }
        }
        </script>

        <title>MIR Consulting — Strategy. Marketing. E-commerce. Intelligence.</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
